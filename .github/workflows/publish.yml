name: Publish Python Package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  publish:
    name: Build, attest, and publish
    runs-on: ubuntu-24.04
    environment: pypi
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false
      - name: Sync verification environment
        run: uv sync --extra dev --extra benchmark
      - name: Verify package and receipt wedge
        run: |
          uv run ruff check src tests scripts
          uv run ruff format --check src tests scripts
          uv run pytest tests -v
          uv run python scripts/receipt_core_benchmark.py
          uv run python scripts/authority_bundle.py --check
      - name: Build distributions
        run: uv build
      - name: Attest distribution provenance
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2.4.0
        with:
          subject-path: "dist/*"
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@ed0c53931b1dc9bd32cbe73a98c7f6766f8a527e # v1.13.0, PEP 740 attestations enabled by default
