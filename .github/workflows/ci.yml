name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Compliance audit
        run: bash scripts/compliance_audit.sh
      - name: Static sanity
        run: python -m pyflakes src scripts tests
      - name: Compile
        run: python -m compileall src scripts
      - name: Tests
        run: python -m unittest tests/test_codec.py -v

