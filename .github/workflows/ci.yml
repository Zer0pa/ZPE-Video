name: CI

on:
  push:
    branches:
      - main
      - codex/action-brief-execution
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-core:
    name: Core receipt surface
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync dev environment
        run: uv sync --extra dev
      - name: Run all tests
        run: uv run pytest tests -v

  lint:
    name: Ruff lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync dev environment
        run: uv sync --extra dev
      - name: Ruff check
        run: uv run ruff check src tests scripts
      - name: Ruff format check
        run: uv run ruff format --check src tests scripts

  receipt-core-benchmark:
    name: Receipt-core benchmark
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - name: Sync benchmark environment
        run: uv sync --extra dev --extra benchmark
      - name: Run receipt-core benchmark
        run: uv run python scripts/receipt_core_benchmark.py
      - name: Check authority bundle current
        run: uv run python scripts/authority_bundle.py --check
