name: Verify Package Surface

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-and-import:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build
          python -m build
      - name: Verify wheel import surface
        run: |
          python -m venv .venv-wheel
          . .venv-wheel/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          python - <<'PY'
          import zpe_video
          expected = {
              "Box", "CrossWriterMismatch", "PerceptionReceipt",
              "ReceiptCorrupted", "Wave1Pipeline", "WIRE_MAGIC",
              "WIRE_VERSION", "__version__",
              "decode_receipt", "encode_receipt", "read_receipt",
              "receipt_hash", "verify_receipt", "write_receipt",
          }
          assert set(zpe_video.__all__) == expected, (
              "public API changed unexpectedly: "
              f"got {sorted(zpe_video.__all__)}, expected {sorted(expected)}"
          )
          print("wheel public API OK", zpe_video.__version__)
          PY
      - name: Run repo-local unit tests
        run: |
          python -m venv .venv-dev
          . .venv-dev/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m pytest tests -v

  cross-writer-receipt-smoke:
    name: Cross-writer receipt smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
      - name: Pin the commercial wedge
        run: |
          python -m pytest tests/test_receipt.py::test_cross_writer_independent_implementation_matches -v
