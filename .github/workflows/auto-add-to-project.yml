name: Auto-add to project board
on:
  issues:
    types: [opened, transferred]
  pull_request:
    types: [opened]

jobs:
  add-to-project:
    runs-on: ubuntu-latest
    env:
      ADD_TO_PROJECT_PAT: ${{ secrets.ADD_TO_PROJECT_PAT }}
    steps:
      - uses: actions/add-to-project@v1.0.2
        if: ${{ env.ADD_TO_PROJECT_PAT != '' }}
        with:
          project-url: https://github.com/orgs/Zer0pa/projects/1
          github-token: ${{ env.ADD_TO_PROJECT_PAT }}
      - name: Skip project board add when token is unavailable
        if: ${{ env.ADD_TO_PROJECT_PAT == '' }}
        run: echo "ADD_TO_PROJECT_PAT is unavailable; skipping project-board automation."
